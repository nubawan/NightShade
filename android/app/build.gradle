apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

react {
    autolinkLibrariesWithApp()
}

def enableProguardInReleaseBuilds = true

def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.screenfilterapp"
    defaultConfig {
        applicationId "com.screenfilterapp"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 4
        versionName "3.1.0"

        // Build only for arm64-v8a to reduce build time and memory usage
        ndk {
            abiFilters = ['arm64-v8a']
        }
    }

    // ABI splits disabled — building single APK for arm64-v8a only
    splits {
        abi {
            enable false
        }
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            shrinkResources enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    // Packaging options — exclude unnecessary files from the APK
    packagingOptions {
        resources {
            excludes += [
                '/META-INF/{AL2.0,LGPL2.1}',
                '/META-INF/LICENSE',
                '/META-INF/LICENSE.txt',
                '/META-INF/license.txt',
                '/META-INF/NOTICE',
                '/META-INF/NOTICE.txt',
                '/META-INF/notice.txt',
            ]
        }
    }
}

// Map ABI to version code offset for Play Store multi-APK
// Each ABI gets a unique versionCode range so Play Store delivers the right one
ext.abiCodes = ['armeabi-v7a': 1, 'x86': 2, 'x86_64': 3, 'arm64-v8a': 4]
import com.android.build.OutputFile
android.applicationVariants.all { variant ->
    if (variant.buildType.name == "release") {
        variant.outputs.each { output ->
            def abiVersionCode = project.ext.abiCodes.get(output.getFilter(OutputFile.ABI))
            if (abiVersionCode != null) {
                output.versionCodeOverride = variant.versionCode * 100 + abiVersionCode
            }
        }
    }
}

dependencies {
    // React Native
    implementation("com.facebook.react:react-android")

    // Hermes engine — much smaller than JSC (~3MB vs ~8MB)
    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }

    // AndroidX Core - foreground service support
    implementation("androidx.core:core-ktx:1.12.0")
    implementation("androidx.core:core:1.12.0")

    // AndroidX Annotation
    implementation("androidx.annotation:annotation:1.7.1")

    // AndroidX Splash Screen API
    implementation("androidx.core:core-splashscreen:1.0.1")
}

// React Native Vector Icons - copy font files during build
apply from: "../../node_modules/react-native-vector-icons/fonts.gradle"
